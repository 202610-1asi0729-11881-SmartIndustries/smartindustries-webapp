version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - "if [ -z \"$API_URL\" ]; then echo 'ERROR: API_URL is not set in Amplify Environment Variables!'; exit 1; fi"
        - "sed -i 's|http://localhost:8080/api/v1|'\"$API_URL\"'|g' src/environments/environment.ts"
    build:
      commands:
        - npm run build --configuration=production
  artifacts:
    baseDirectory: dist/smartlock-webapp/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
