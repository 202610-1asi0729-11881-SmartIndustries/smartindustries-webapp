<div class="title">
  <h1>{{"home.title" | translate}}</h1>
  <button matButton="elevated" (click)="openCreateOrganizationForm()">
    <mat-icon>add</mat-icon>
    {{"home.create-organization" | translate}}
  </button>
</div>
<div class="organizations-grid">
  @for(organization of store.organizations(); track organization.id) {
    <app-organization-card [organization]="organization"/>
  }
</div>
