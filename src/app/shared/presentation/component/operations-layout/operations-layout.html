<mat-drawer-container class="sidebar">
  <mat-drawer mode="side" opened class="item-container">
    @for (item of items; track item.label; let i = $index){
      <a mat-button [routerLink]="item.route" routerLinkActive="active">
        <mat-icon class="icon"> {{ item.icon }}</mat-icon>
        <span> {{item.label}} </span>
      </a>
    }
  </mat-drawer>
  <mat-drawer-content>
    <h1>H</h1>
  </mat-drawer-content>
</mat-drawer-container>
